name: Deploy to GitHub Pages

on:
  # Trigger the workflow on push to the main branch
  push:
    branches:
      - main
  # Trigger the workflow on a schedule (e.g., daily at midnight UTC) to fetch the latest Google Sheets data
  schedule:
    - cron: '0 0 * * *'
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build and Fetch Data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js (Node 24)
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Build Project (Fetches Google Sheets Data & Runs Vite)
        run: npm run build
        env:
          SHEET_ID: ${{ vars.SHEET_ID || secrets.SHEET_ID }}
          GID: ${{ vars.GID || secrets.GID }}
          MAPPING_GID: ${{ vars.MAPPING_GID || secrets.MAPPING_GID }}
          VITE_SHEET_ID: ${{ vars.SHEET_ID || secrets.SHEET_ID }}
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL || secrets.VITE_BACKEND_URL }}
          VITE_GITHUB_REPO: ${{ github.repository }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
